<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space & Aqua Dashboard</title>
    <!-- MapLibre GL JS CSS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    
    <!-- PHASE 1: Initial Load Screen (Cascade Loading) -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-space-black">
      <div class="flex space-x-3 items-center justify-center h-24">
        <!-- 5 Vertical cascades -->
        <div class="w-2 h-16 gradient-aqua rounded-full animate-cascade-1"></div>
        <div class="w-2 h-16 gradient-aqua rounded-full animate-cascade-2"></div>
        <div class="w-2 h-16 gradient-aqua rounded-full animate-cascade-3"></div>
        <div class="w-2 h-16 gradient-aqua rounded-full animate-cascade-4"></div>
        <div class="w-2 h-16 gradient-aqua rounded-full animate-cascade-5"></div>
      </div>
      <div class="absolute bottom-10 text-aqua-muted text-sm tracking-widest uppercase font-semibold">
        Initializing System
      </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
